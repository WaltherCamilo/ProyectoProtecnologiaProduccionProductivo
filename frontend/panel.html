<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel</title>
</head>
<body style="background:#0f172a; color:white;">

<nav style="display:flex; justify-content:space-between; padding:15px;">
    <h2>ProTecnologiaTech</h2>

    <div style="position:relative;">
        <span id="userName" style="cursor:pointer;"></span>

        <div id="userMenu" style="
            display:none;
            position:absolute;
            right:0;
            top:30px;
            background:#1e1e1e;
            padding:15px;
            border-radius:10px;
            width:250px;
        ">
            <p id="infoNombre"></p>
            <p id="infoEmail"></p>
            <p id="infoTelefono"></p>

            <button onclick="logout()">Salir</button>
        </div>
    </div>
</nav>

<h1 style="text-align:center;">Bienvenido al sistema</h1>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "login.html";
}

document.getElementById("userName").innerText = user.nombre;

document.getElementById("infoNombre").innerText = "👤 " + user.nombre;
document.getElementById("infoEmail").innerText = "📧 " + user.email;
document.getElementById("infoTelefono").innerText = "📱 " + user.telefono;

document.getElementById("userName").addEventListener("click", () => {
    const menu = document.getElementById("userMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
});

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "index.html";
}
</script>

</body>
</html>
